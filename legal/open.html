<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wensa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #f0ece3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f0ece3;
    }
    .logo span { color: #c9a84c; }
    .subtitle {
      font-size: 1rem;
      color: #888;
      max-width: 280px;
      line-height: 1.5;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border-radius: 100px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity 0.15s;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #c9a84c; color: #0d0d0d; }
    .btn-secondary { background: #1e1e1e; color: #f0ece3; border: 1px solid #333; }
    .actions { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 280px; }
    .actions.hidden { display: none; }
    #status { font-size: 0.9rem; color: #888; min-height: 1.2em; }
  </style>
</head>
<body>
  <div class="logo">Wensa<span>.</span></div>

  <div id="spinner" class="spinner"></div>
  <p id="status">Opening in app…</p>

  <div id="actions" class="actions hidden">
    <p class="subtitle">Get the Wensa app to explore places and events.</p>
    <a id="storeBtn" href="#" class="btn btn-primary">Download Wensa</a>
    <a id="openBtn" href="#" class="btn btn-secondary">Open in app</a>
  </div>

  <script>
    (function () {
      var path = location.pathname.replace(/^\//, '');
      var params = location.search;
      var qs = new URLSearchParams(params);

      // Build the custom-scheme deep link (triple-slash keeps the path)
      var deepLink = 'wensa:///' + path + params;

      // Detect platform
      var ua = navigator.userAgent;
      var isIOS = /iPhone|iPad|iPod/.test(ua);
      var isAndroid = /Android/.test(ua);

      var storeBtn = document.getElementById('storeBtn');
      var openBtn = document.getElementById('openBtn');

      if (isIOS) {
        storeBtn.href = 'https://apps.apple.com/app/wensa/id6472619990';
        storeBtn.textContent = 'Download on the App Store';
      } else if (isAndroid) {
        storeBtn.href = 'https://play.google.com/store/apps/details?id=app.wensa.mobile';
        storeBtn.textContent = 'Get it on Google Play';
      } else {
        // Desktop: just show download options
        storeBtn.href = 'https://apps.apple.com/app/wensa/id6472619990';
        storeBtn.textContent = 'Download Wensa';
      }
      openBtn.href = deepLink;

      // Try opening the app immediately
      var hidden = false;
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) hidden = true;
      });

      try {
        location.href = deepLink;
      } catch (e) {}

      // If the app opened, the page becomes hidden. After 2.5s reveal fallback UI.
      setTimeout(function () {
        if (!hidden) {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('status').textContent = 'App not found. Download Wensa to continue.';
          document.getElementById('actions').classList.remove('hidden');
        }
      }, 2500);
    })();
  </script>
</body>
</html>
