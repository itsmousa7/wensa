name: future_riverpod
description: "A new Flutter project."


publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.4



dependencies:
  flutter:
    sdk: flutter

  
  
  cupertino_icons: ^1.0.8

  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  riverpod_annotation: ^4.0.0
  go_router: ^17.1.0
  validators: ^3.0.0

  pin_code_fields: ^8.0.1

  flutter_dotenv: ^6.0.0
  gap: ^3.0.1
  google_fonts: ^8.0.1
  google_sign_in: ^7.2.0
  google_sign_in_ios: ^6.3.0
  shared_preferences: ^2.5.4
  flutter_localizations:
    sdk: flutter
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.3
  lottie: ^3.3.2
  url_launcher: ^6.3.2
  webview_flutter: ^4.10.0
  http: ^1.4.0
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  flutter_svg: ^2.2.4
  cupertino_native: ^0.1.1
  supabase_flutter: ^2.12.0
  qr_flutter: ^4.1.0
  flutter_riverpod: ^3.1.0
  intl: ^0.20.2
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  intl_phone_field: ^3.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  custom_lint: ^0.8.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_lint: ^3.1.0
  riverpod_generator: ^4.0.0+1




flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
    - assets/lottie/animation/
    - assets/lottie/categories/
    - assets/viewer/
    - .env

  fonts:
    - family: Graphik-Bold
      fonts:
        - asset: assets/fonts/graphik-bold.ttf
      
    - family: Graphik-Light
      fonts:
        - asset: assets/fonts/graphik-light.ttf
    
    - family: Ibm-Bold
      fonts:
        - asset: assets/fonts/ibm-bold.ttf

    - family: Graphik-Extra-Bold
      fonts:
        - asset: assets/fonts/graphik-extra-bold.ttf