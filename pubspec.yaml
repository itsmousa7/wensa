name: future_riverpod
description: "A new Flutter project."


publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.10.4



dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Cupertino / icon glyphs ───────────────────────────────────────────
  cupertino_icons: ^1.0.8
  cupertino_native_better: ^1.5.0

  # ── Code-gen annotations (json_annotation is pulled transitively by
  #     freezed_annotation; google_sign_in_ios by google_sign_in) ───────
  freezed_annotation: ^3.1.0
  riverpod_annotation: ^4.0.0

  # ── State / routing ──────────────────────────────────────────────────
  flutter_riverpod: ^3.1.0
  go_router: ^17.1.0

  # ── Backend / auth ───────────────────────────────────────────────────
  supabase_flutter: ^2.12.0
  google_sign_in: ^7.2.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^18.0.1

  # ── Networking / storage ─────────────────────────────────────────────
  http: ^1.4.0
  shared_preferences: ^2.5.4
  flutter_dotenv: ^6.0.0
  path_provider: ^2.1.5

  # ── Media / UI primitives ────────────────────────────────────────────
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4
  lottie: ^3.3.2
  skeletonizer: ^2.1.3
  google_fonts: ^8.0.1
  gap: ^3.0.1

  # ── Forms / inputs ───────────────────────────────────────────────────
  validators: ^3.0.0
  pin_code_fields: ^8.0.1
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  image_picker: ^1.2.1
  image_cropper: ^11.0.0

  # ── Misc features ────────────────────────────────────────────────────
  url_launcher: ^6.3.2
  webview_flutter: ^4.10.0
  qr_flutter: ^4.1.0
  share_plus: ^13.1.0
  screenshot: ^3.0.0
  flutter_native_splash: ^2.4.8


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.10.4
  custom_lint: ^0.8.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_lint: ^3.1.0
  riverpod_generator: ^4.0.0+1
  flutter_launcher_icons: ^0.14.3
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3490A2"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter_native_splash:
  color: "#3490A2"
  android: true
  ios: true
  fullscreen: true




flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/fonts/
    - assets/lottie/animation/
    - assets/lottie/categories/
    - assets/viewer/
    - .env

  fonts:
    - family: Graphik-Bold
      fonts:
        - asset: assets/fonts/graphik-bold.ttf
      
    - family: Graphik-Light
      fonts:
        - asset: assets/fonts/graphik-light.ttf
    
    - family: Ibm-Bold
      fonts:
        - asset: assets/fonts/ibm-bold.ttf

    - family: Graphik-Extra-Bold
      fonts:
        - asset: assets/fonts/graphik-extra-bold.ttf